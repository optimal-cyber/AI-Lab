# =============================================================================
# gateway-host stack (EC2 #2): LiteLLM + Postgres + NeMo Guardrails + MCP + cloudflared
# =============================================================================
# .env is provided by secrets-bootstrap.sh (tmpfs, role=gateway) and symlinked here.
# Build contexts assume the repo is present on the host (compose run from
# <repo>/docker/gateway-host, so ../../mcp-server resolves). See docs/deploy.md.
# =============================================================================

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "litellm"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "litellm"
    volumes:
      - litellm-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 5s
      retries: 5

  nemo-guardrails:
    build: ./nemo
    restart: unless-stopped
    environment:
      # Present for NeMo init only; the deterministic rails never call out.
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      NEMO_DECISION_LOG: "/var/log/nemo/decisions.log"
    volumes:
      - nemo-logs:/var/log/nemo
    healthcheck:
      test: ["CMD", "python", "server.py", "--health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  compliance-mcp:
    build:
      context: ../../mcp-server
    restart: unless-stopped
    environment:
      SAM_GOV_API_KEY: "${SAM_GOV_API_KEY}"
      MCP_TRANSPORT: "http"
      # MCP egresses to api.sam.gov via the Squid allowlist proxy.
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      NO_PROXY: "${NO_PROXY:-}"
    healthcheck:
      test: ["CMD", "python", "-m", "src.server", "--health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  litellm:
    # PINNED BY DIGEST (supply-chain control — docs/litellm-supply-chain.md).
    # `main-stable` is a floating tag; in a CMMC boundary the running image must
    # be immutable + reproducible. Resolved digest of main-stable on 2026-06-18.
    # Re-pin (and regenerate the SBOM) with scripts/pin-litellm-digest.sh.
    image: ghcr.io/berriai/litellm@sha256:713e2a036aecc8f2cb24cdf0bdeffd893b4f37190d4b21eb9e26ac648939c67a
    restart: unless-stopped
    # Bound to 0.0.0.0:4000 — reachable from the chat host within the private
    # subnet (app SG allows 4000 intra-subnet only; never from the internet).
    ports:
      - "4000:4000"
    command: ["--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY}"
      LITELLM_SALT_KEY: "${LITELLM_SALT_KEY}"
      DATABASE_URL: "${DATABASE_URL}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      # NeMo DaaS endpoint for the custom guardrail (../nemo_guardrail.py)
      NEMO_GUARDRAIL_URL: "http://nemo-guardrails:8000"
      # so `guardrail: nemo_guardrail.NemoDaaSGuardrail` is importable
      PYTHONPATH: "/app"
      # Hide the off-brand LiteLLM Swagger/ReDoc API pages at `/` and `/redoc`
      # (the `/v1` API + the SSO-gated `/ui` control plane are unaffected). For
      # admins to land on the control plane, add a Cloudflare Single Redirect
      # `gateway.optimallabs.io/` -> `/ui` (see docs/demo-live.md).
      NO_DOCS: "True"
      NO_REDOC: "True"
      # Okta admin OIDC (direct — ADR-007)
      PROXY_BASE_URL: "${PROXY_BASE_URL}"
      GENERIC_CLIENT_ID: "${GENERIC_CLIENT_ID}"
      GENERIC_CLIENT_SECRET: "${GENERIC_CLIENT_SECRET}"
      GENERIC_AUTHORIZATION_ENDPOINT: "${GENERIC_AUTHORIZATION_ENDPOINT}"
      GENERIC_TOKEN_ENDPOINT: "${GENERIC_TOKEN_ENDPOINT}"
      GENERIC_USERINFO_ENDPOINT: "${GENERIC_USERINFO_ENDPOINT}"
      GENERIC_INCLUDE_CLIENT_ID: "${GENERIC_INCLUDE_CLIENT_ID}"
      GENERIC_SCOPE: "${GENERIC_SCOPE}"
      GENERIC_USER_ROLE_JWT_FIELD: "${GENERIC_USER_ROLE_JWT_FIELD}"
      # Provider egress via the Squid allowlist proxy (ADR-009). NO_PROXY keeps
      # intra-VPC service-to-service traffic (postgres, nemo, mcp) off the proxy.
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      NO_PROXY: "${NO_PROXY:-},postgres,nemo-guardrails,compliance-mcp,localhost,127.0.0.1"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
      - ./nemo_guardrail.py:/app/nemo_guardrail.py:ro
    depends_on:
      postgres:
        condition: service_healthy
      nemo-guardrails:
        condition: service_healthy
      compliance-mcp:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # gateway-facade — OUR OpenAI-compatible front door (Phase 1, docs/own-gateway.md)
  # Runs ALONGSIDE litellm on 4001. It owns the /v1 surface, the auth gate, the
  # guardrail enforcement point, and the audit trail; it proxies provider work to
  # the pinned litellm engine on 4000. Cut Open WebUI / the tunnel over from
  # litellm:4000 -> gateway-facade:4001 once smoke tests pass (gateway/README.md).
  # ---------------------------------------------------------------------------
  gateway-facade:
    build:
      context: ../../gateway
    restart: unless-stopped
    # Intra-subnet only, same posture as litellm:4000 (never internet-facing).
    ports:
      - "4001:4001"
    environment:
      # Branding — set these to your product (name + logo URL) so the surface is
      # yours, not a LiteLLM wrapper. Overridable via the host env / Secrets Manager.
      GATEWAY_NAME: "${GATEWAY_NAME:-AI Gateway}"
      GATEWAY_LOGO_URL: "${GATEWAY_LOGO_URL:-https://optimallabs.io/optimal-horizon.svg}"
      GATEWAY_UPSTREAM_URL: "http://litellm:4000"
      GATEWAY_GUARDRAIL_URL: "http://nemo-guardrails:8000"
      # Default OFF: litellm still runs the NeMo rails today, so enforcing here
      # too would double every NeMo call. Flip to "true" as the cutover step that
      # moves guardrail enforcement onto the façade (then remove the guardrails:
      # block from litellm-config.yaml). Audit rows are written either way.
      GATEWAY_GUARDRAIL_ENFORCE: "false"
      # Phase 2 control plane (docs/own-gateway.md) — ON: the façade is the front
      # door and owns virtual keys/budgets/audit. It validates caller keys against
      # its own store and forwards to LiteLLM under UPSTREAM_KEY (falls back to the
      # LiteLLM master key if a dedicated one isn't seeded). BOOTSTRAP_KEY seeds a
      # default team + that key on first boot so Open WebUI + devs work immediately
      # (admins mint scoped keys via /admin/ui). Set CONTROL_PLANE=false to revert
      # to transparent-proxy mode (keys/budgets stay in LiteLLM).
      GATEWAY_CONTROL_PLANE: "true"
      GATEWAY_DB_PATH: "/var/lib/gateway/control.db"
      GATEWAY_MASTER_KEY: "${GATEWAY_MASTER_KEY:-}"
      GATEWAY_UPSTREAM_KEY: "${GATEWAY_UPSTREAM_KEY:-${LITELLM_MASTER_KEY}}"
      GATEWAY_BOOTSTRAP_KEY: "${GATEWAY_BOOTSTRAP_KEY:-}"
      GATEWAY_BOOTSTRAP_TEAM: "lab"
      # The façade only ever talks to intra-docker services (litellm, nemo); it
      # never egresses to providers — that hop stays on litellm. Keep it off Squid.
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      NO_PROXY: "litellm,nemo-guardrails,localhost,127.0.0.1"
    volumes:
      - gateway-logs:/var/log/gateway
      - gateway-data:/var/lib/gateway
    depends_on:
      litellm:
        condition: service_started
      nemo-guardrails:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "src.app", "--health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN}"
      # IMPORTANT: EXPLICITLY unset the proxy env, otherwise the docker daemon's
      # /root/.docker/config.json `proxies` block (which we set so BuildKit can
      # reach docker.io for image manifests) auto-injects HTTP(S)_PROXY into
      # every container. cloudflared's Go HTTP transport would then route
      # origin requests (http://litellm:4000) through Squid; Squid sees the
      # Host header gateway.optimallabs.io which is NOT in its allowlist and
      # returns 403, so users hit a Squid "Access Denied" page after Okta auth.
      # Tunnel data plane uses port 7844 direct (SG-allowed); origin is intra-
      # docker; cloudflared doesn't need a proxy.
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ""
      no_proxy: ""
    depends_on:
      # Front door is the façade (:4001); the tunnel routes gateway.<domain> here.
      gateway-facade:
        condition: service_started

volumes:
  litellm-pg:
  nemo-logs:
  gateway-logs:
  gateway-data:
