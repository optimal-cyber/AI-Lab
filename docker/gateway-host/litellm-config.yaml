# =============================================================================
# LiteLLM proxy config — AI lab gateway
# =============================================================================
# Verify model strings / SSO env names against the LiteLLM version you deploy
# (ghcr.io/berriai/litellm:main-stable). Outbound calls to providers go THROUGH
# the Squid proxy — HTTP(S)_PROXY/NO_PROXY are set on the container in compose
# (ADR-009 Phase 2 dependency).
# =============================================================================

# Models behind one endpoint + one virtual key, each tagged with a compliance
# posture (model_info, ADR-014): access_tier=dev (commercial boundary) or
# access_tier=gov (government-ready boundary). Per-key allow-lists decide who can
# reach which tier (roadmap G3).
#   NOTE: the posture key is `access_tier`, NOT `tier`. LiteLLM's ModelInfo
#   reserves `tier` as a typed enum (Literal['free','paid']); a `tier: dev` there
#   raises a ModelInfo ValidationError that makes LiteLLM drop the ENTIRE
#   model_list at startup (symptom: /v1/models empty, "no healthy deployments").
#   `access_tier` is an arbitrary extra field LiteLLM ignores. The façade derives
#   a model's dev/gov tier from the `gov/` id-prefix (gateway/src/admin.py), not
#   from this label, so renaming it is safe.
# Verify model strings / provider wiring against the LiteLLM version
# you deploy — see the header note above. Anthropic IDs verified against the
# claude-api reference (Fable 5 most capable; Opus 4.8 default; Sonnet 4.6
# balanced; Haiku 4.5 fast).
model_list:
  # ===========================================================================
  # access_tier: dev — commercial boundaries (development / demos; never "gov-ready")
  # ===========================================================================
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      access_tier: dev
      boundary: "commercial (OpenAI-direct)"
      cloud: openai
      region: us
      fedramp: none
      residency: us
      retention: provider-default
      il: n/a

  - model_name: claude-fable-5            # most capable
    litellm_params:
      model: anthropic/claude-fable-5
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      access_tier: dev
      boundary: "commercial (Anthropic-direct)"
      cloud: anthropic
      region: us
      fedramp: none
      residency: us
      retention: provider-default
      il: n/a

  - model_name: claude-opus-4-8           # default Opus tier
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      access_tier: dev
      boundary: "commercial (Anthropic-direct)"
      cloud: anthropic
      region: us
      fedramp: none
      residency: us
      retention: provider-default
      il: n/a

  - model_name: claude-sonnet-4-6         # speed / intelligence balance
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      access_tier: dev
      boundary: "commercial (Anthropic-direct)"
      cloud: anthropic
      region: us
      fedramp: none
      residency: us
      retention: provider-default
      il: n/a

  - model_name: claude-haiku-4-5          # fastest / cheapest
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      access_tier: dev
      boundary: "commercial (Anthropic-direct)"
      cloud: anthropic
      region: us
      fedramp: none
      residency: us
      retention: provider-default
      il: n/a

  # ===========================================================================
  # access_tier: gov — government-ready boundaries (ADR-014)
  # ===========================================================================
  # CONFIG-READY, NOT LIVE in this lab: the lab runs in a commercial AWS account
  # (us-east-1, ADR — see README) with no GovCloud / Claude-Platform-on-AWS
  # credentials. The entry below provisions routing + the posture tag; it goes
  # live once gov creds (Secrets Manager) and egress (Squid allowlist: the gov
  # provider endpoint) are added.
  #
  # First government-ready *Claude* path = Claude Platform on AWS (Anthropic-
  # operated; SigV4 + AWS IAM; US; FULL API parity incl. server-side tools /
  # Managed Agents). Its LiteLLM provider wiring for the
  # aws-external-anthropic.<region>.api.aws endpoint must be confirmed against the
  # deployed LiteLLM version, so it is left as a documented target rather than a
  # guessed provider string. Until confirmed, Amazon Bedrock in GovCloud is the
  # working gov Claude path (partner-operated; feature subset — no Anthropic
  # server-side tools / Managed Agents):
  # --- gov-tier deployments: DISABLED until cloud creds are provisioned -------
  # IMPORTANT: these entries referenced env vars that don't exist in this deploy
  # (VERTEX_GOV_PROJECT, AZURE_GOV_OPENAI_ENDPOINT/_API_KEY). An unresolvable
  # `os.environ/…` ref makes LiteLLM drop the ENTIRE model_list at startup
  # (symptom: /v1/models empty, "no healthy deployments" for every model). They
  # are "config-ready, not live" (ADR-014/015), so they stay commented until the
  # boundary's creds + Squid egress are provisioned. To enable one: uncomment its
  # block, seed its creds (Secrets Manager + secrets-bootstrap), add the env vars,
  # and add the provider endpoint to the Squid allowlist. See docs/operate.md §6.
  #
  #  - model_name: gov/claude-opus-4-8        # AWS GovCloud (Bedrock)
  #    litellm_params:
  #      model: bedrock/anthropic.claude-opus-4-8
  #      aws_region_name: us-gov-west-1
  #    model_info: { access_tier: gov, boundary: "AWS GovCloud (Bedrock)", fedramp: high, il: "IL4/IL5-eligible" }
  #
  #  - model_name: gov/claude-opus-4-8        # GCP Vertex (Assured Workloads) — cross-cloud failover
  #    litellm_params:
  #      model: vertex_ai/claude-opus-4-8
  #      vertex_project: os.environ/VERTEX_GOV_PROJECT     # set this env to enable
  #      vertex_location: us-central1
  #    model_info: { access_tier: gov, boundary: "GCP Vertex AI (Assured Workloads)", fedramp: high, il: "IL4-eligible" }
  #
  #  - model_name: gov/gpt-4o                  # Azure Government (Azure OpenAI)
  #    litellm_params:
  #      model: azure/gpt-4o-gov
  #      api_base: os.environ/AZURE_GOV_OPENAI_ENDPOINT     # set this env to enable
  #      api_key: os.environ/AZURE_GOV_OPENAI_API_KEY       # set this env to enable
  #      api_version: "2024-10-21"
  #    model_info: { access_tier: gov, boundary: "Azure Government (Azure OpenAI)", fedramp: high, il: "IL4/IL5-eligible" }

# --- Guardrails: NeMo as a DaaS hook on input (pre) and output (post) --------
# Both point at the same custom class (../nemo_guardrail.py, mounted + on
# PYTHONPATH); it calls the NeMo DaaS service and FAILS CLOSED if unreachable.
# Both rails are default_on + fail-closed for ALL tenants; for gov-tier tenants
# they are MANDATORY and non-removable — disabling either is a policy violation
# (ADR-018 / G4). The output (post_call) rail is the one that catches
# model-generated leaks.
guardrails:
  - guardrail_name: "nemo-input"
    litellm_params:
      guardrail: nemo_guardrail.NemoDaaSGuardrail
      mode: "pre_call"
      default_on: true
  - guardrail_name: "nemo-output"
    litellm_params:
      guardrail: nemo_guardrail.NemoDaaSGuardrail
      mode: "post_call"
      default_on: true

# --- MCP servers: the compliance MCP over streamable HTTP (Phase 3) ----------
mcp_servers:
  compliance:
    url: "http://compliance-mcp:8000/mcp"
    transport: "http"
    description: "Read-only compliance tools: SAM.gov, Federal Register, NIST 800-53, POA&Ms, CMMC L2"

# --- general settings --------------------------------------------------------
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # Config-driven models: serve the model_list above directly. (Was `true`, which
  # makes the DB the source of truth for MODELS — on a fresh DB the router stays
  # empty: /v1/models returns [] and every call 400s with "no healthy
  # deployments". Virtual keys/teams/budgets still persist in the DB regardless
  # of this flag; the façade owns the customer-facing control plane either way.)
  store_model_in_db: false
  # Lock the admin UI to admins. Network reachability is already gated by
  # Cloudflare Access (lab-admins + MFA + WARP + US); the Okta LiteLLM app is
  # assigned to lab-admins ONLY, so non-admins cannot complete the OIDC login.
  ui_access_mode: "admin_only"
  # --- per-tenant budget alerting (ADR-018 / G4) ---------------------------
  # DISABLED until a webhook exists: `alerting: ["slack"]` with no SLACK_WEBHOOK_URL
  # raises ValueError on every alert (noisy tracebacks in the logs). Re-enable by
  # setting SLACK_WEBHOOK_URL in the env and uncommenting the two lines below.
  # alerting: ["slack"]
  # alerting_threshold: 300 # also alerts on requests slower than 300s

litellm_settings:
  drop_params: true
  # SSO default role: proxy_admin.
  #
  # Rationale (refines ADR-007): the LiteLLM admin Okta OIDC app is assigned to
  # `lab-admins` only — non-admins cannot complete authentication. Cloudflare
  # Access in front of this hostname ALSO requires lab-admins + MFA + US geo. So
  # by the time a request reaches this proxy, the user is a verified admin via
  # two independent gates upstream.
  #
  # The original plan was to read role from a JWT claim
  # (GENERIC_USER_ROLE_JWT_FIELD=litellm_role, a custom Okta token-claim
  # expression). That worked in theory but the Okta token-claim plumbing turned
  # out to be more fragile than the upstream group gating. Defaulting to
  # proxy_admin here yields the same effective security model with one fewer
  # moving part — and it's documented honestly.
  #
  # Budget/model defaults stay restrictive — admin overrides per-key.
  default_internal_user_params:
    max_budget: 0.0
    models: []
    user_role: "proxy_admin"

  # --- Admin UI branding: Optimal Labs / AI Gateway -------------------------
  # The Optimal Horizon mark on the LiteLLM Admin control plane. Served by the
  # landing site (Cloudflare Pages — landing/optimal-horizon.svg) so the admin's
  # browser can fetch it cross-subdomain; goes live once Pages redeploys AND the
  # litellm container is recreated. NOTE: the open-source UI still shows the
  # "LiteLLM" wordmark in places — full white-label (name removal, colors) and
  # custom Swagger-docs branding are LiteLLM Enterprise features. Verify the
  # ui_theme_config keys against your deployed LiteLLM version; if an SVG favicon
  # doesn't render, swap favicon_url for an .ico.
  ui_theme_config:
    logo_url: "https://optimallabs.io/optimal-horizon.svg"
    favicon_url: "https://optimallabs.io/optimal-horizon.svg"

# --- multi-cloud routing / failover (ADR-015 / roadmap G2) -------------------
# Same-named model_list deployments form a routing group; the proxy load-balances
# and retries the next deployment on failure. `gov/claude-opus-4-8` spans AWS
# GovCloud + GCP Assured Workloads → cross-cloud failover for one logical model.
# Verify keys against the LiteLLM version you deploy.
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2

# --- SSO / role mapping ------------------------------------------------------
# Okta OIDC env (GENERIC_*) is set on the container in compose. Role mapping:
#   * Okta 'AI Lab — LiteLLM Admin' app is assigned to group `lab-admins` ONLY,
#     so only admins can authenticate at all (docs/okta-setup.md §4).
#   * GENERIC_USER_ROLE_JWT_FIELD=groups exposes the groups claim; map
#     `lab-admins` -> proxy_admin in the LiteLLM UI / via env on first login.
#   * Everyone else -> internal_user_viewer (above).
# This is the defense-in-depth layer behind Cloudflare Access (ADR-007).
