# =============================================================================
# chat-host stack (EC2 #1): Optimal chat (our own UI) + cloudflared
# =============================================================================
# .env is provided by secrets-bootstrap.sh (tmpfs, role=chat) and symlinked here.
# Run via the ai-lab-stack@chat systemd unit (after the secrets unit).
#
# This runs OUR OWN branded chat (../../chat-ui), not Open WebUI — the chat
# surface must be unmistakably the product, not an off-the-shelf wrapper. The app
# serves the Optimal UI and proxies /v1 to the gateway façade server-side, so the
# upstream key never reaches the browser.
# =============================================================================

services:
  chat:
    build:
      context: ../../chat-ui
    restart: unless-stopped
    # ---------------------------------------------------------------------
    # LOAD-BEARING SECURITY BOUNDARY (ADR-007 / threat T-CHAT-S):
    # Bind to 127.0.0.1 ONLY. Trusted-header SSO (Cloudflare Access + Okta) means
    # anything that can reach this port can act as any user. Only cloudflared (same
    # host, same docker network) must reach it. DO NOT change to 0.0.0.0, DO NOT
    # publish to the app subnet. This single bind is the entire boundary.
    # ---------------------------------------------------------------------
    ports:
      - "127.0.0.1:8080:8080"
    # The Cloudflare tunnel ingress points at http://open-webui:8080 (set up for
    # the previous client). Keep that docker DNS name reachable via an alias so we
    # never have to touch the remote-managed tunnel config.
    networks:
      default:
        aliases:
          - open-webui
    environment:
      # Talk to the gateway FAÇADE (:4001) using the façade bootstrap virtual key.
      # The key stays SERVER-SIDE in this app — it never reaches the browser. The
      # app proxies /v1 to the façade, which validates the key + forwards to LiteLLM.
      FACADE_URL: "http://${LITELLM_HOST_IP}:4001"
      GATEWAY_BOOTSTRAP_KEY: "${GATEWAY_BOOTSTRAP_KEY}"
      CHAT_NAME: "${WEBUI_NAME:-Optimal}"
      # The app's only outbound is to the façade intra-VPC; keep it off Squid.
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ""
      no_proxy: ""
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN}"
      # IMPORTANT: EXPLICITLY unset the proxy env, otherwise the docker daemon's
      # /root/.docker/config.json `proxies` block auto-injects HTTP(S)_PROXY into
      # every container. cloudflared's Go HTTP transport would then route origin
      # requests (http://open-webui:8080) through Squid; Squid sees the Host header
      # chat.optimallabs.io which is NOT in its allowlist and returns 403, so users
      # hit a Squid "Access Denied" page after Okta auth.
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ""
      no_proxy: ""
    depends_on:
      chat:
        condition: service_healthy
