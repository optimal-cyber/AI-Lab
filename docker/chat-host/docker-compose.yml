# =============================================================================
# chat-host stack (EC2 #1): Open WebUI + cloudflared
# =============================================================================
# .env is provided by secrets-bootstrap.sh (tmpfs, role=chat) and symlinked here.
# Run via the ai-lab-stack@chat systemd unit (after the secrets unit).
# =============================================================================

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    # ---------------------------------------------------------------------
    # LOAD-BEARING SECURITY BOUNDARY (ADR-007 / threat T-CHAT-S):
    # Bind to 127.0.0.1 ONLY. Trusted-header SSO means anything that can reach
    # this port can forge Cf-Access-Authenticated-User-Email and become any
    # user. Only cloudflared (same host, same docker network) must reach it.
    # DO NOT change to 0.0.0.0, DO NOT add a host-published port, DO NOT expose
    # it to the app subnet. This single bind is the entire boundary for this app.
    # ---------------------------------------------------------------------
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      WEBUI_AUTH: "true"
      WEBUI_AUTH_TRUSTED_EMAIL_HEADER: "Cf-Access-Authenticated-User-Email"
      WEBUI_AUTH_TRUSTED_NAME_HEADER: "Cf-Access-Authenticated-User-Name"
      ENABLE_SIGNUP: "false"
      DEFAULT_USER_ROLE: "user"
      # Forward the resolved user identity downstream so LiteLLM can attribute
      # the request to the email (audit-trail story, sso-role-mapping.md).
      ENABLE_FORWARD_USER_INFO_HEADERS: "true"
      WEBUI_SECRET_KEY: "${WEBUI_SECRET_KEY}"
      # Talk to the LiteLLM gateway on EC2 #2 using a LiteLLM virtual key
      # (NOT a provider key — the provider keys never leave the gateway host).
      OPENAI_API_BASE_URL: "http://${LITELLM_HOST_IP}:4000/v1"
      OPENAI_API_KEY: "${LITELLM_VIRTUAL_KEY_WEBUI}"
      # Open WebUI's only outbound is to LiteLLM intra-VPC. Empty proxy env is
      # honest. The trap to dodge: Open WebUI's HTTP client is aiohttp, and
      # aiohttp's `trust_env=True` reads HTTP_PROXY but does NOT honor
      # NO_PROXY at all — neither CIDR ranges nor exact hostnames. So once
      # HTTP_PROXY is set, EVERY request is proxied (years-old upstream
      # limitation). With HTTP_PROXY pointed at Squid, /v1/models gets a 403
      # HTML page because 10.50.10.118 isn't in the Squid dstdomain allowlist,
      # and the model picker stays empty.
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ""
      no_proxy: ""
      # Companion to the empty proxy env: prevent boot-time outbound to
      # huggingface.co (snapshot_download for the all-MiniLM embeddings model
      # used by RAG). With no proxy and no direct egress allowed by the app
      # SG, that connect would hang for the full TCP timeout — long enough
      # for the healthcheck to mark the container unhealthy before Uvicorn
      # gets a chance to bind 8080. Offline mode tells huggingface_hub /
      # transformers to never touch the network and use cache only; with
      # nothing cached, RAG features (embeddings, semantic search) simply
      # stay disabled — fine for this lab, which uses LiteLLM-gateway chat
      # only. (See ADR-009 footnote on outbound architecture.)
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    volumes:
      - open-webui-data:/app/backend/data
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN}"
      # IMPORTANT: EXPLICITLY unset the proxy env, otherwise the docker daemon's
      # /root/.docker/config.json `proxies` block auto-injects HTTP(S)_PROXY into
      # every container. cloudflared's Go HTTP transport would then route origin
      # requests (http://open-webui:8080) through Squid; Squid sees the Host
      # header chat.ironechelon.com which is NOT in its allowlist and returns
      # 403, so users hit a Squid "Access Denied" page after Okta auth.
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: ""
      no_proxy: ""
    depends_on:
      open-webui:
        condition: service_healthy

volumes:
  open-webui-data:
