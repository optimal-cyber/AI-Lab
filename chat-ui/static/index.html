<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Optimal</title>
<link rel="icon" href="/static/optimal-horizon.svg">
<style>
  :root { --bg:#0b1020; --panel:#141b2e; --line:#27314d; --fg:#e7ecf6; --muted:#9aa6c2;
          --accent:#5ea0ff; --user:#1c2742; --bad:#f87171; }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body { background:var(--bg); color:var(--fg);
         font:15px/1.6 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
         display:flex; flex-direction:column; height:100vh; }
  header { display:flex; align-items:center; gap:12px; padding:12px 20px;
           border-bottom:1px solid var(--line); background:var(--panel); flex:0 0 auto; }
  header img { height:26px; width:26px; border-radius:6px; }
  header .brand { font-weight:600; letter-spacing:.2px; }
  header .spacer { flex:1; }
  header select { background:#0e1424; color:var(--fg); border:1px solid var(--line);
                  border-radius:8px; padding:7px 10px; font-size:13px; max-width:230px; }
  header .user { color:var(--muted); font-size:12px; max-width:220px; overflow:hidden;
                 text-overflow:ellipsis; white-space:nowrap; }
  header button.new { background:transparent; color:var(--muted); border:1px solid var(--line);
                      border-radius:8px; padding:7px 12px; cursor:pointer; font-size:13px; }
  main { flex:1 1 auto; overflow-y:auto; }
  .wrap { max-width:820px; margin:0 auto; padding:24px 20px 8px; }
  .empty { display:flex; flex-direction:column; align-items:center; justify-content:center;
           gap:14px; height:100%; color:var(--muted); text-align:center; }
  .empty img { height:56px; width:56px; border-radius:14px; }
  .empty h1 { color:var(--fg); font-size:22px; font-weight:600; margin:0; }
  .empty .sg { display:grid; gap:8px; margin-top:8px; width:min(560px,90vw); }
  .empty .sg button { text-align:left; background:var(--panel); color:var(--fg);
        border:1px solid var(--line); border-radius:10px; padding:10px 14px; cursor:pointer; }
  .empty .sg button span { color:var(--muted); font-size:13px; }
  .msg { display:flex; gap:12px; padding:14px 0; }
  .msg .av { flex:0 0 28px; height:28px; width:28px; border-radius:7px; background:#0e1424;
             display:flex; align-items:center; justify-content:center; }
  .msg .av img { height:20px; width:20px; }
  .msg .who { font-size:12px; color:var(--muted); margin-bottom:2px; }
  .msg .body { white-space:pre-wrap; word-wrap:break-word; }
  .msg.user { justify-content:flex-end; }
  .msg.user .body { background:var(--user); border:1px solid var(--line); border-radius:12px;
                    padding:10px 14px; max-width:80%; }
  .msg .body code { background:#0e1424; padding:1px 6px; border-radius:5px; font-size:13px; }
  .msg .body pre { background:#0e1424; border:1px solid var(--line); border-radius:8px;
                   padding:12px; overflow:auto; }
  .msg .body pre code { background:none; padding:0; }
  .err { color:var(--bad); }
  .composer { flex:0 0 auto; border-top:1px solid var(--line); background:var(--panel); }
  .composer .inner { max-width:820px; margin:0 auto; padding:14px 20px; display:flex; gap:10px; align-items:flex-end; }
  textarea { flex:1; resize:none; background:#0e1424; color:var(--fg); border:1px solid var(--line);
             border-radius:12px; padding:12px 14px; font:inherit; max-height:200px; }
  .send { background:var(--accent); color:#06122b; border:0; border-radius:10px; padding:12px 18px;
          font-weight:600; cursor:pointer; }
  .send:disabled { opacity:.5; cursor:default; }
  .foot { text-align:center; color:var(--muted); font-size:11px; padding:0 0 10px; }
</style>
</head>
<body>
<header>
  <img src="/static/optimal-horizon.svg" alt="Optimal">
  <span class="brand">Optimal</span>
  <select id="model" title="Model"></select>
  <div class="spacer"></div>
  <span class="user" id="user"></span>
  <button class="new" onclick="newChat()">New chat</button>
</header>

<main id="main">
  <div class="wrap" id="thread"></div>
</main>

<div class="composer">
  <div class="inner">
    <textarea id="input" rows="1" placeholder="Message Optimal…"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
              oninput="autosize(this)"></textarea>
    <button class="send" id="send" onclick="send()">Send</button>
  </div>
  <div class="foot">Governed by the Optimal gateway — every request authorized, scanned, and logged.</div>
</div>

<script>
const $ = id => document.getElementById(id);
let messages = [];      // [{role, content}]
let busy = false;
const esc = s => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

// minimal, safe markdown: escape first, then code fences / inline code / bold.
function md(t){
  let h = esc(t);
  h = h.replace(/```([\s\S]*?)```/g, (_, c) => '<pre><code>' + c.replace(/^\n/,'') + '</code></pre>');
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  return h;
}

const SUGGESTIONS = [
  ['Summarize a solicitation', 'extract the key requirements', 'Summarize this solicitation and list the key technical and compliance requirements as concise bullet points.'],
  ['Draft a control narrative', 'NIST 800-171 / CMMC L2', 'Draft a concise implementation narrative for NIST 800-171 control 3.1.1 (access control) for a small defense contractor.'],
  ['Screen text for sensitive data', 'PII / CUI before it leaves', 'Review the following text and flag any PII, CUI, or otherwise sensitive information that should not be shared externally:\n\n'],
];

function renderEmpty(){
  const model = $('model').value || 'a model';
  $('thread').innerHTML = `
    <div class="empty">
      <img src="/static/optimal-horizon.svg" alt="">
      <h1>How can I help?</h1>
      <div style="font-size:13px">One governed door to every approved model — currently <b>${esc(model)}</b>.</div>
      <div class="sg">${SUGGESTIONS.map((s,i)=>
        `<button onclick="useSuggestion(${i})"><b>${esc(s[0])}</b><br><span>${esc(s[1])}</span></button>`).join('')}</div>
    </div>`;
}
function useSuggestion(i){ $('input').value = SUGGESTIONS[i][2]; autosize($('input')); $('input').focus(); }

function render(){
  if(!messages.length){ renderEmpty(); return; }
  $('thread').innerHTML = messages.map(m => m.role === 'user'
    ? `<div class="msg user"><div class="body">${esc(m.content)}</div></div>`
    : `<div class="msg"><div class="av"><img src="/static/optimal-horizon.svg" alt=""></div>
         <div><div class="who">Optimal · ${esc(m.model||'')}</div>
         <div class="body${m.error?' err':''}">${m.error?esc(m.content):md(m.content)||'<span style="color:var(--muted)">…</span>'}</div></div></div>`
  ).join('');
  $('main').scrollTop = $('main').scrollHeight;
}
function newChat(){ messages = []; render(); $('input').focus(); }
function autosize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,200)+'px'; }

async function send(){
  const text = $('input').value.trim();
  if(!text || busy) return;
  const model = $('model').value;
  messages.push({role:'user', content:text});
  $('input').value=''; autosize($('input'));
  const assistant = {role:'assistant', content:'', model};
  messages.push(assistant);
  busy = true; $('send').disabled = true; render();
  try{
    const resp = await fetch('/v1/chat/completions', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model, stream:true,
        messages: messages.filter(m=>!m.error).map(({role,content})=>({role,content})).slice(0,-1)})});
    if(!resp.ok){
      const e = await resp.json().catch(()=>({}));
      assistant.error = true;
      assistant.content = (e.error && e.error.message) ? e.error.message : ('Request failed (HTTP '+resp.status+')');
      render(); return;
    }
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      buf += dec.decode(value, {stream:true});
      const lines = buf.split('\n'); buf = lines.pop();
      for(const line of lines){
        const l = line.trim();
        if(!l.startsWith('data:')) continue;
        const d = l.slice(5).trim();
        if(d === '[DONE]') continue;
        try{ const j = JSON.parse(d);
          const delta = j.choices && j.choices[0] && j.choices[0].delta && j.choices[0].delta.content;
          if(delta){ assistant.content += delta; render(); }
        }catch(_){}
      }
    }
    if(!assistant.content){ assistant.content = '(no content returned)'; }
  }catch(err){
    assistant.error = true; assistant.content = 'Network error: ' + err.message;
  }finally{
    busy = false; $('send').disabled = false; render(); $('input').focus();
  }
}

(async function init(){
  try{
    const cfg = await (await fetch('/config')).json();
    if(cfg.user) $('user').textContent = cfg.user;
  }catch(_){}
  try{
    const models = (await (await fetch('/v1/models')).json()).data || [];
    const pref = ['claude-sonnet-4-6','claude-opus-4-8','claude-haiku-4-5'];
    const ids = models.map(m=>m.id);
    const def = pref.find(p=>ids.includes(p)) || ids[0] || '';
    $('model').innerHTML = ids.map(id=>`<option ${id===def?'selected':''}>${esc(id)}</option>`).join('');
    $('model').onchange = () => { if(!messages.length) renderEmpty(); };
  }catch(_){ $('model').innerHTML = '<option>claude-opus-4-8</option>'; }
  render(); $('input').focus();
})();
</script>
</body>
</html>
